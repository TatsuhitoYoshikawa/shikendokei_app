name: shikendokei
description: "試験時計 - 設定した開始時刻から時を刻む試験シミュレーション時計アプリ"
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.0
  # 日本語フォント（見出し=Shippori Mincho / UI=Zen Kaku Gothic New / 数字=Roboto）
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/

# アプリアイコン生成設定（dart run flutter_launcher_icons で適用）。
# デザイナー作成のアイコン（export/）を、マスター(iOS/汎用) と
# Android アダプティブ2レイヤー（前景＋背景）に使用する。
flutter_launcher_icons:
  ios: true
  android: true
  remove_alpha_ios: true
  image_path: "export/appicon_1024.png"
  adaptive_icon_background: "export/appicon_android_background_432.png"
  adaptive_icon_foreground: "export/appicon_android_foreground_432.png"
  web:
    generate: true
    background_color: "#FCFCFD"
    theme_color: "#009BFA"
  macos:
    generate: true
